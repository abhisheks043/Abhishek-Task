name: AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@review')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract PR info
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Fetch PR files
        run: |
          curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr_number }}/files \
          > files.json

          echo "Changed files:"
          cat files.json | jq '.[].filename'

      - name: Prepare patches
        run: |
          jq -c '.[] | {file: .filename, patch: .patch}' files.json > patches.json

      - name: Call OpenAI reviewer
        id: ai
        run: |

          PATCH=$(cat patches.json | head -c 12000)

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
          -s \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg patch "$PATCH" \
            '{
              model: "gpt-4o-mini",
              messages: [
                {
                  role: "system",
                  content: "You are a senior software engineer performing a pull request review."
                },
                {
                  role: "user",
                  content: "Analyze these git patches and return review comments in JSON format with fields: file, line, comment.\n\n\($patch)"
                }
              ]
            }')")

          echo "OpenAI response:"
          echo "$RESPONSE"

          COMMENTS=$(echo "$RESPONSE" | jq '.choices[0].message.content')

          if [ "$COMMENTS" = "null" ]; then
            echo "No comments generated."
            echo "comments=[]" >> $GITHUB_OUTPUT
          else
            echo "comments=$COMMENTS" >> $GITHUB_OUTPUT
          fi

      - name: Post inline review comments
        run: |

          COMMENTS='${{ steps.ai.outputs.comments }}'

          if [ "$COMMENTS" = "[]" ]; then
            echo "No AI comments to post"
            exit 0
          fi

          echo "$COMMENTS" | jq -c '.[]' | while read comment; do

            FILE=$(echo "$comment" | jq -r '.file')
            LINE=$(echo "$comment" | jq -r '.line')
            BODY=$(echo "$comment" | jq -r '.comment')

            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg body "$BODY" \
                --arg path "$FILE" \
                --argjson line "$LINE" \
                '{
                  body: $body,
                  path: $path,
                  line: $line,
                  side: "RIGHT"
                }')" \
              https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr_number }}/comments

          done
