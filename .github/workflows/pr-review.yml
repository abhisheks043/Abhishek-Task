name: Debug AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@review')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract PR number
        id: pr
        run: |
          PR=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "PR=$PR"
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Fetch PR files
        run: |
          curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }}/files \
          > files.json

          echo "FILES JSON:"
          cat files.json

      - name: Extract patches
        run: |
          jq -c '.[] | {file: .filename, patch: .patch}' files.json > patches.json
          echo "PATCHES:"
          cat patches.json

      - name: Send to OpenAI
        id: ai
        run: |

          PATCH=$(cat patches.json | head -c 10000)

          echo "PATCH SENT TO AI:"
          echo "$PATCH"

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
          -s \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg patch "$PATCH" \
            '{
              model: "gpt-4o-mini",
              messages: [
                {role:"system",content:"You are a code reviewer."},
                {role:"user",content:"Return JSON array: [{file,line,comment}] for issues.\n\n\($patch)"}
              ]
            }')")

          echo "OPENAI RESPONSE:"
          echo "$RESPONSE"

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "[]"')

          echo "$CONTENT" > comments.json

          echo "AI COMMENTS:"
          cat comments.json

      - name: Post fallback PR comment
        run: |

          BODY=$(cat comments.json)

          echo "Posting comment to PR..."

          curl -v \
          -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg body "$BODY" '{body:$body}')" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr }}/comments
