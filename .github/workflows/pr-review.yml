name: AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@review')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Fetch changed files
        run: |
          curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr_number }}/files \
          > files.json

      - name: Extract patches
        run: |
          jq -r '.[] | "FILE: \(.filename)\n\(.patch)\n---"' files.json > patches.txt

      - name: Send to OpenAI
        id: ai
        run: |
          PATCH=$(cat patches.txt | head -c 12000)

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
          -s \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
          --arg diff "$PATCH" \
          '{
            model: "gpt-4o-mini",
            messages: [
              {
                role: "system",
                content: "You are a senior software engineer performing a pull request review."
              },
              {
                role: "user",
                content: "Review these file patches and provide structured feedback grouped by file:\n\n\($diff)"
              }
            ]
          }')")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review
        run: |
          curl -s \
          -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg body "${{ steps.ai.outputs.review }}" '{body:$body}')" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments
