name: Production AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@review') &&
      github.event.comment.user.type != 'Bot'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Fetch PR files
        run: |
          curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr_number }}/files \
          > files.json

          echo "Changed files:"
          jq '.[].filename' files.json

      - name: Prepare minimal patch summary
        run: |
          jq -c '.[] | {file: .filename, patch: .patch}' files.json \
          | head -n 20 > patches.json

          echo "Patch preview:"
          cat patches.json

      - name: Ask OpenAI for review
        id: ai
        run: |

          PATCH=$(cat patches.json | head -c 12000)

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
            -s \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg patch "$PATCH" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {
                    role: "system",
                    content: "You are a senior software engineer reviewing pull requests."
                  },
                  {
                    role: "user",
                    content: "Analyze these git patches and return JSON array with fields: file, line, comment.\n\n\($patch)"
                  }
                ]
              }')")

          echo "OpenAI raw response:"
          echo "$RESPONSE"

          COMMENTS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "[]"')

          echo "$COMMENTS" > comments.json

      - name: Post inline comments
        run: |

          if [ ! -s comments.json ]; then
            echo "No comments generated"
            exit 0
          fi

          jq -c '.[]' comments.json | while read comment; do

            FILE=$(echo "$comment" | jq -r '.file')
            LINE=$(echo "$comment" | jq -r '.line')
            BODY=$(echo "$comment" | jq -r '.comment')

            echo "Posting comment on $FILE:$LINE"

            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg body "$BODY" \
                --arg path "$FILE" \
                --argjson line "$LINE" \
                '{
                  body: $body,
                  path: $path,
                  line: $line,
                  side: "RIGHT"
                }')" \
              https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr_number }}/comments

          done
