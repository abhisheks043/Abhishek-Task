name: PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'cursor review')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR info
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Fetch PR diff
        id: diff
        run: |
          DIFF=$(curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3.diff" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr_number }})

          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Ask OpenAI for review
        id: ai
        run: |
          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
          -s \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
          --arg diff "${{ steps.diff.outputs.diff }}" \
          '{
            model: "gpt-4o-mini",
            messages: [
              {
                role: "system",
                content: "You are a senior software engineer performing a PR review."
              },
              {
                role: "user",
                content: "Review this pull request diff and provide clear actionable feedback:\n\n\($diff)"
              }
            ]
          }')")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        run: |
          curl -s \
          -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg body "${{ steps.ai.outputs.review }}" '{body:$body}')" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments
