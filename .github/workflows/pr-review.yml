name: AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@review')

    runs-on: ubuntu-latest

    steps:
      - name: Extract PR number
        id: pr
        run: |
          PR=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "PR number: $PR"
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Fetch PR files
        run: |
          curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }}/files \
          > files.json

          echo "FILES:"
          cat files.json

      - name: Build patch summary
        run: |
          jq -r '.[] | "\(.filename)\n\(.patch)\n---"' files.json > patch.txt
          echo "PATCH:"
          cat patch.txt

      - name: Ask OpenAI
        id: ai
        run: |

          PATCH=$(cat patch.txt | head -c 8000)

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
            -s \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg patch "$PATCH" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {role:"system",content:"You are a strict code reviewer."},
                  {role:"user",content:"Review this diff and give feedback:\n\n\($patch)"}
                ]
              }')")

          echo "OPENAI RESPONSE:"
          echo "$RESPONSE"

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI returned empty response."')

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        run: |
          BODY="${{ steps.ai.outputs.review }}"

          echo "POSTING COMMENT:"
          echo "$BODY"

          curl -v -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "$BODY" '{body:$body}')" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr }}/comments
