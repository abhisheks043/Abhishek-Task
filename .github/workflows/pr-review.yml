name: AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@review')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "PR_NUMBER=$PR_NUMBER"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Fetch PR diff
        id: diff
        run: |
          DIFF=$(curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3.diff" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr_number }})

          echo "---- DIFF SAMPLE ----"
          echo "$DIFF" | head -n 40
          echo "---------------------"

          DIFF=$(echo "$DIFF" | head -c 12000)

          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Call OpenAI
        id: ai
        run: |

          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "❌ OPENAI_API_KEY secret missing"
            echo "review=OPENAI_API_KEY secret missing" >> $GITHUB_OUTPUT
            exit 0
          fi

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
          -s \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg diff "${{ steps.diff.outputs.diff }}" \
            '{
              model: "gpt-4o-mini",
              messages: [
                {
                  role: "system",
                  content: "You are a senior engineer reviewing a pull request."
                },
                {
                  role: "user",
                  content: "Review the following git diff and provide feedback grouped by file:\n\n\($diff)"
                }
              ]
            }')")

          echo "----- OPENAI RESPONSE -----"
          echo "$RESPONSE"
          echo "---------------------------"

          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')

          if [ ! -z "$ERROR" ]; then
            echo "OpenAI error: $ERROR"
            REVIEW="❌ OpenAI API error:\n$ERROR"
          else
            REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          fi

          if [ -z "$REVIEW" ]; then
            REVIEW="⚠️ AI returned empty response. Check workflow logs."
          fi

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review
        run: |
          COMMENT_URL="https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments"

          BODY="${{ steps.ai.outputs.review }}"

          curl -s \
          -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg body "$BODY" '{body:$body}')" \
          "$COMMENT_URL"
