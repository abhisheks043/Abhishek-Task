name: AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@review') &&
      github.event.comment.user.type != 'Bot'

    runs-on: ubuntu-latest

    steps:
      - name: Get PR number
        id: pr
        run: |
          PR=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Fetch changed files
        run: |
          curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }}/files \
          > files.json

      - name: Build patch summary
        run: |
          jq -r '.[] | "\(.filename)\n\(.patch)\n---"' files.json | head -c 12000 > patch.txt

      - name: Ask OpenAI for review
        id: ai
        run: |

          PATCH=$(cat patch.txt)

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
            -s \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg patch "$PATCH" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {
                    role: "system",
                    content: "You are a senior software engineer performing code reviews."
                  },
                  {
                    role: "user",
                    content: "Review the following git diff. Provide concise improvement suggestions grouped by file. Always return useful feedback even if the code is correct.\n\n\($patch)"
                  }
                ]
              }')")

          echo "$RESPONSE"

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
            REVIEW="AI review failed. Check workflow logs."
          fi

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "${{ steps.ai.outputs.review }}" '{body:$body}')" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr }}/comments
