name: Claude PR Review

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    if: github.event.issue.pull_request && contains(github.event.comment.body, '/review')

    steps:
      - name: Extract PR number
        id: pr
        run: |
          PR=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "PR number: $PR"
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Get PR head SHA
        id: sha
        run: |
          curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }} \
          > pr.json

          SHA=$(jq -r '.head.sha' pr.json)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Fetch PR files
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }}/files \
            > files.json

          echo "Fetched PR files:"
          cat files.json

      - name: Build patch summary
        run: |
          jq -r '.[] | select(.patch != null) | "\(.filename)\n\(.patch)\n---"' files.json > patch.txt

          echo "Patch preview:"
          head -n 50 patch.txt

      - name: Call Claude API
        id: review
        run: |
          PATCH=$(head -c 12000 patch.txt)

          echo "Sending patch to Claude..."

          RESPONSE=$(curl https://api.anthropic.com/v1/messages \
            -s \
            -H "x-api-key: ${{ secrets.CLAUDE_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "$(jq -n \
              --arg patch "$PATCH" \
              '{
                "model": "claude-sonnet-4-6",
                "max_tokens": 1000,
                "messages": [
                  {
                    "role": "user",
                    "content": "You are a senior engineer reviewing a pull request.\n\nAnalyze the git diff and return JSON ONLY in this format:\n\n{\n \"comments\": [\n   {\n     \"file\": \"path/to/file\",\n     \"line\": number,\n     \"comment\": \"review comment\"\n   }\n ]\n}\n\nDiff:\n\n\($patch)"
                  }
                ]
              }')")

          echo "Claude API raw response:"
          echo "$RESPONSE" > claude_raw.json
          echo "$RESPONSE" | jq -r '.content[0].text' > review.json

          if [ -z "$RESULT" ]; then
            RESULT="⚠️ Claude returned no review. Check workflow logs for API response."
          fi

          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post inline comments
        run: |

          COMMENTS=$(jq '.comments | length' review.json)

          if [ "$COMMENTS" = "null" ]; then
            echo "No comments returned"
            exit 0
          fi

          for ((i=0;i<COMMENTS;i++)); do

            FILE=$(jq -r ".comments[$i].file" review.json)
            LINE=$(jq -r ".comments[$i].line" review.json)
            TEXT=$(jq -r ".comments[$i].comment" review.json)

            echo "Posting comment on $FILE:$LINE"

            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }}/comments \
              -d "$(jq -n \
                --arg body "$TEXT" \
                --arg path "$FILE" \
                --argjson line "$LINE" \
                --arg commit "${{ steps.sha.outputs.sha }}" \
                '{
                  body:$body,
                  path:$path,
                  line:$line,
                  side:"RIGHT",
                  commit_id:$commit
                }')"
