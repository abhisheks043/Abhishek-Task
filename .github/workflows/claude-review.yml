name: Claude PR Review

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    if: github.event.issue.pull_request && contains(github.event.comment.body, '/review')

    steps:
      - name: Extract PR number
        id: pr
        run: |
          PR=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          echo "PR number: $PR"
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Fetch PR files
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }}/files \
            > files.json

          echo "Fetched PR files:"
          cat files.json

      - name: Build patch summary
        run: |
          jq -r '.[] | select(.patch != null) | "\(.filename)\n\(.patch)\n---"' files.json > patch.txt

          echo "Patch preview:"
          head -n 50 patch.txt

      - name: Call Claude API
        id: review
        run: |
          PATCH=$(head -c 12000 patch.txt)

          echo "Sending patch to Claude..."

          RESPONSE=$(curl https://api.anthropic.com/v1/messages \
            -s \
            -H "x-api-key: ${{ secrets.CLAUDE_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "$(jq -n \
              --arg patch "$PATCH" \
              '{
                "model": "claude-opus-4-20250514",
                max_tokens: 1000,
                messages: [
                  {
                    role: "user",
                    content: "You are a senior engineer reviewing a pull request. Identify bugs, edge cases, security issues, and improvements.\n\nReview this diff:\n\n\($patch)"
                  }
                ]
              }')")

          echo "Claude API raw response:"
          echo "$RESPONSE"

          RESULT=$(echo "$RESPONSE" | jq -r '.content[0].text // empty')

          if [ -z "$RESULT" ]; then
            RESULT="⚠️ Claude returned no review. Check workflow logs for API response."
          fi

          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment to PR
        run: |
          BODY="${{ steps.review.outputs.result }}"

          echo "Posting comment to PR..."

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "$BODY" '{body:$body}')" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr }}/comments
