name: Cursor PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  cursor-review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@cursor_review')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR details
        id: get-pr
        run: |
          PR_URL=$(jq -r '.issue.pull_request.url' "$GITHUB_EVENT_PATH")
          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

      - name: Get PR diff
        id: get-diff
        run: |
          DIFF=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ steps.get-pr.outputs.pr_url }}")

          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Load project context
        id: load-context
        run: |
          if [ -f ".cursor-context" ]; then
            CONTEXT=$(cat .cursor-context)
          else
            CONTEXT="No context provided."
          fi

          echo "context<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to Cursor API
        id: send-cursor
        run: |
          RESPONSE=$(curl -s \
            -X POST "https://api.cursor.sh/review" \
            -H "Authorization: Bearer ${{ secrets.CURSOR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                  --arg diff "${{ steps.get-diff.outputs.diff }}" \
                  --arg ctx "${{ steps.load-context.outputs.context }}" \
                  '{diff: $diff, context: $ctx}')")

          echo "$RESPONSE" > response.json

          REVIEW_TEXT=$(jq -r '.reviewText // .message // "No review returned."' response.json)

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review to PR
        run: |
          COMMENT_URL="https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.get-pr.outputs.issue_number }}/comments"

          curl -s \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "${{ steps.send-cursor.outputs.review }}" '{body:$body}')" \
            "$COMMENT_URL"
