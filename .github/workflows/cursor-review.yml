name: Cursor PR Review

on:
  issue_comment:
    types: [created]

jobs:
  cursor-review:
    # Run only if comment is on a PR AND contains @cursor_review
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@cursor_review')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract PR info
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          PR_API_URL=$(jq -r '.issue.pull_request.url' "$GITHUB_EVENT_PATH")

          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "PR_API_URL=$PR_API_URL" >> $GITHUB_OUTPUT

      - name: Get PR diff
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ steps.pr.outputs.PR_API_URL }} \
            -o pr.diff

      - name: Run review (placeholder)
        run: |
          echo "Running Cursor review..."
          echo "Files changed:"
          cat pr.diff | head -100

      - name: Comment review result
        run: |
          gh pr comment ${{ steps.pr.outputs.PR_NUMBER }} \
            --body "✅ Cursor review triggered by **@cursor_review** and completed."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
